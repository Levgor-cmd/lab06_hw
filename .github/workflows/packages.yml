name: Build Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake build-essential rpm
    
    - name: Configure
      run: cmake -S . -B github_build -DCMAKE_INSTALL_PREFIX=_install
    
    - name: Build
      run: cmake --build github_build
    
    - name: Create packages
      run: |
        cd github_build
        cpack -G TGZ
        cpack -G DEB || echo "DEB package skipped (maintainer issue)"
        cpack -G RPM
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          github_build/*.tar.gz
          github_build/*.deb
          github_build/*.rpm
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
